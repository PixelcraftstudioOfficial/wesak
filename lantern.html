<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>වෙසක් කූඩු - Pixel Craft Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="lantern-page-body">

    <audio id="bgMusic" loop>
        <source src="assets/bg-music.mp3" type="audio/mpeg">
    </audio>

    <button id="musicToggleBtn" onclick="toggleMusic()">🎵 Play Music</button>

    <div style="text-align: left; position: absolute; top: 20px; left: 20px; z-index: 100;">
        <a href="index.html" class="enter-btn" style="font-size: 1rem; padding: 10px 20px; border-color: #aaaaaa; color: #aaaaaa; text-decoration: none;">🔙 මුල් පිටුවට</a>
    </div>

    <section class="lantern-section">
        <h2 class="section-title" style="margin-bottom: 80px; text-shadow: 0 0 20px #00ffff;">ඩිජිටල් අටපට්ටම් කූඩුව</h2>
        
        <div class="scene-octagon">
            <div class="lantern-octagon">
                <div class="oct-face face-1"><img src="assets/lantern-pattern.png" alt="pattern"></div>
                <div class="oct-face face-2"><img src="assets/lantern-pattern.png" alt="pattern"></div>
                <div class="oct-face face-3"><img src="assets/lantern-pattern.png" alt="pattern"></div>
                <div class="oct-face face-4"><img src="assets/lantern-pattern.png" alt="pattern"></div>
                <div class="oct-face face-5"><img src="assets/lantern-pattern.png" alt="pattern"></div>
                <div class="oct-face face-6"><img src="assets/lantern-pattern.png" alt="pattern"></div>
                <div class="oct-face face-7"><img src="assets/lantern-pattern.png" alt="pattern"></div>
                <div class="oct-face face-8"><img src="assets/lantern-pattern.png" alt="pattern"></div>
            </div>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
